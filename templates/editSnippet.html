{% extends "layout.html" %}

{% block title %}{{ snippet["name"] }} - Snippet Oracle{% endblock %}

{% block content %}
<section class="section">
    <div class="container">
        <h1 class="title">Edit Snippet {{ snippet["name"] }}</h1>

        <form method="post" class="box">
            <div class="field">
                <label class="label" for="name">Snippet Name</label>
                <div class="control">
                    <input class="input" type="text" name="name" value={{ snippet["name"] }} required>
                </div>
            </div>

            <div class="field">
                <label class="label" for="code">Code</label>
                <div class="control">
                    <textarea class="textarea" name="code">{{ snippet["code"] }}</textarea>
                </div>
            </div>

            <div class="field">
                <label class="label" for="description">Description</label>
                <div class="control">
                    <textarea class="textarea" name="description">{{ snippet["description"] }}</textarea>
                </div>
            </div>

            <div class="field">
                <div class="control">
                    <textarea class="textarea" name="tags">{% for tag in tags %}{{tag["name"]}}, {% endfor %}</textarea>
                </div>
            </div>

            <div class="field">
                <div class="control">
                    <button class="button is-link is-fullwidth" type="submit">Edit Snippet</button>
                </div>
            </div>
        </form>

        <div class="buttons is-centered mt-4">
            <a class="button is-light" id="cancel">Cancel</a>
        </div>
    </div>
</section>
{% endblock %}

{% block scripts %}
{{ super() }}
<script src="{{ url_for('static', filename='cancel.js') }}"></script>
{% endblock %}
